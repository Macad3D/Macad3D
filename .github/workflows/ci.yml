name: CI

on: [pull_request, push, workflow_dispatch]
  
jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        uses: ./.github/actions/build

  test:
    name: Run Tests
    needs: build
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        module: [unit, memory]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unit tests
        uses: ./.github/actions/test
        with:
          module: ${{ matrix.module }}
