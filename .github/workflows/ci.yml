name: CI

on: [pull_request, push, workflow_dispatch]
  
permissions:
  checks: write
  
jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build
        uses: ./.github/actions/build

  test:
    name: Run Unit Tests
    needs: build
    runs-on: windows-latest

    strategy:
      matrix:
        module: [unit, ui, memory]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unit tests
        uses: ./.github/actions/test
        with:
          module: ${{ matrix.module }}
       
      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: Unit Tests
          path: Test.Unit.xml
          path-replace-backslashes: true
          reporter: dotnet-nunit
          list-suites: failed
          list-tests: failed
          fail-on-error: true
          working-directory: ./bin/release/TestResults
