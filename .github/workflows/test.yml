on: workflow_call

permissions:
  checks: write
  
jobs:
  test:
    name: Run Unit Tests
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
        path: .\bin\release
        
    - name: Run unit tests
      run: .\ScriptConsole.cmd test unit

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: (failure())
      with:
        name: test-results
        path: |
          .\bin\release\TestResults\Test.Unit.xml
          .\Data\UnitTests\**\*_TestResult.*
      
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action/windows@v2
      if: (!cancelled())
      with:
        files: .\bin\release\TestResults\Test.Unit.xml
        comment_mode: off
        report_individual_runs: true
        action_fail: true
        
