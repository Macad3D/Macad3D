name: 'Test Report'
on:
  workflow_run:
    workflows: ['CI']  # runs after CI workflow
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
    - uses: dorny/test-reporter@v2
      with:
        artifact: /test-results-(.*)/
        name: Test report ($1)
        path: '**/*.xml'
        reporter: dotnet-nunit
        list-suites: failed
        list-tests: failed
        fail-on-error: false