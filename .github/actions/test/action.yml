name: Run Unit Tests

permissions:
  checks: write
  
runs:
  steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Download build artifact
    uses: actions/download-artifact@v4
    with:
      name: build-artifact
      path: .\bin\release
      
  - name: Run unit tests
    run: .\ScriptConsole.cmd test unit

  - name: Upload test results
    uses: actions/upload-artifact@v4
    if: ${{ failure() }}
    with:
      name: test-results
      path: |
        .\bin\release\TestResults\Test.Unit.xml
        .\Data\UnitTests\**\*_TestResult.*

        
